<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#b25c53",
                        "background-light": "#f7f6f6",
                        "background-dark": "#1d1615",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden border border-primary/10">
<!-- Header / Top Bar -->
<header class="flex items-center justify-between border-b border-primary/10 px-6 py-4">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-2xl">
                        straighten
                    </span>
</div>
<h2 class="font-serif text-xl font-bold tracking-tight text-slate-900 dark:text-white uppercase">MEDICIÓN</h2>
</div>
<button class="flex items-center justify-center rounded-full h-8 w-8 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</header>
<!-- Modal Content -->
<div class="p-8 flex flex-col items-center text-center">
<!-- Date Display -->
<div class="mb-2">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-widest">Fecha</p>
<h3 class="text-slate-900 dark:text-white text-2xl font-bold mt-1">Miércoles, 18 de Marzo</h3>
</div>
<!-- Time Display -->
<div class="mt-6 mb-8 bg-primary/5 dark:bg-primary/10 rounded-xl px-10 py-6 border border-primary/10">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-widest mb-1">Hora</p>
<h1 class="text-primary text-5xl font-bold tracking-tighter">06:00</h1>
</div>
<!-- Additional Details -->
<div class="w-full text-left bg-background-light dark:bg-background-dark/50 rounded-lg p-5 mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-lg">info</span>
<h3 class="text-slate-900 dark:text-white text-base font-bold">Detalles de la cita</h3>
</div>
<p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">No hay notas adicionales para esta medición.</p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-3">
<button class="w-full py-4 bg-primary text-white rounded-lg font-bold text-sm uppercase tracking-wider hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
                    Ver Ficha
                </button>
<button class="w-full py-4 bg-transparent border-2 border-primary/20 text-primary rounded-lg font-bold text-sm uppercase tracking-wider hover:bg-primary/5 transition-all">
                    Reprogramar
                </button>
</div>
</div>
<!-- Footer Decoration -->
<div class="h-1.5 w-full bg-gradient-to-r from-primary/20 via-primary to-primary/20"></div>
</div>
</body></html>
